<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <script src="markdown-it.min.js"></script>
    <link rel="stylesheet" href="github-dark.min.css">
    <script src="highlight.min.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    
    <style>
        body {
            background-color: var(--bg-color); 
            background-image: var(--chat-bg-image); /* 【新增】背景图 */
            background-size: cover;
            background-position: center;
            color: var(--text-color);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box;
            position: relative; /* 为 overlay 提供定位上下文 */
        }
        
        /* 【新增】全局遮罩层，用于压暗/提亮背景图，保证文字可读 */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--overlay-color);
            pointer-events: none; /* 允许鼠标事件穿透 */
            z-index: 0;
        }

        #chat-container { 
            flex: 1; overflow-y: auto; padding-right: 10px; 
            position: relative; z-index: 1; /* 确保内容在遮罩层之上 */
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        .message { margin-bottom: 20px; display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { align-self: flex-end; }
        .ai-message { align-self: flex-start; }

        .bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.6; word-wrap: break-word; }
        .user-message .bubble { background-color: var(--bubble-user-bg); color: white; border-bottom-right-radius: 2px; }
        .ai-message .bubble { background-color: var(--bubble-ai-bg); color: var(--text-color); border-bottom-left-radius: 2px; border: 1px solid var(--bubble-ai-border); }

        .ai-message .bubble p { margin: 0 0 10px 0; }
        .ai-message .bubble p:last-child { margin-bottom: 0; }
        .ai-message .bubble pre { background-color: var(--code-bg); padding: 10px; border-radius: 6px; overflow-x: auto; position: relative; }
        .ai-message .bubble code { font-family: "Consolas", "Courier New", monospace; font-size: 0.9em; }
        .ai-message .bubble p code { background-color: var(--inline-code-bg); padding: 2px 4px; border-radius: 4px; }
        
        .copy-btn {
            position: absolute; top: 5px; right: 5px; background: #555; color: #fff;
            border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer;
            font-size: 12px; opacity: 0; transition: opacity 0.2s;
        }
        .ai-message .bubble pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #009faa; }

        .thinking-block {
            background-color: var(--thinking-bg); border-left: 3px solid var(--thinking-border); border-radius: 4px;
            padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--thinking-text);
            font-style: italic; white-space: pre-wrap; max-height: 300px; overflow-y: auto;
        }
        .thinking-header { font-weight: bold; color: var(--thinking-header); margin-bottom: 6px; font-style: normal; }

        .usage-info {
            font-size: 12px; color: #888; margin-top: 6px; padding-left: 16px; font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <div id="chat-container"></div>

    <script>
        const md = window.markdownit({
            html: false, linkify: true, typographer: true,
            highlight: function (str, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try { return hljs.highlight(str, { language: lang }).value; } catch (__) {}
                }
                return ''; 
            }
        });
        
        // 【修复】安全加固：限制 linkify 只允许 http/https/ftp 协议，防止 XSS
        md.linkify.set({ validate: function(url) {
            return /^(https?:\/\/|ftp:\/\/)/i.test(url);
        }});
        
        // 【修复】链接安全：强制 target="_blank" + rel="noopener"，防止新窗口注入主页面
        var defaultLinkOpen = md.renderer.rules.link_open || function(tokens, idx, options, env, self) {
            return self.renderToken(tokens, idx, options);
        };
        md.renderer.rules.link_open = function(tokens, idx, options, env, self) {
            var token = tokens[idx];
            var attrs = token.attrNames || [];
            // 添加安全属性
            token.attrPush(['target', '_blank']);
            token.attrPush(['rel', 'noopener noreferrer']);
            return defaultLinkOpen(tokens, idx, options, env, self);
        };

        let currentAiBubble = null;
        let currentAiRawText = "";
        let currentAiThinkingText = "";
        let currentThinkingBlock = null;
        let currentThinkingContent = null;
        let bridge = null;

        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
        });

        // 全局右键菜单拦截
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault(); 
            const aiMsg = e.target.closest('.ai-message');
            if (aiMsg) {
                const bubble = aiMsg.querySelector('.bubble');
                if (bubble) {
                    const plainText = bubble.innerText; 
                    const markdownText = aiMsg.getAttribute('data-raw') || ''; 
                    if (bridge) {
                        bridge.triggerContextMenu(plainText, markdownText);
                    }
                }
            }
        });

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        window.addUserMessage = function(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user-message';
            msgDiv.innerHTML = `<div class="bubble">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>")}</div>`;
            document.getElementById('chat-container').appendChild(msgDiv);
            scrollToBottom();
        };

        window.startAiMessage = function() {
            currentAiRawText = "";
            currentAiThinkingText = "";
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ai-message';
            msgDiv.setAttribute('data-raw', ''); 
            msgDiv.innerHTML = `
                <div class="thinking-block" style="display:none;">
                    <div class="thinking-header">💡 思考过程</div>
                    <div class="thinking-content"></div>
                </div>
                <div class="bubble"><span class="typing">思考中...</span></div>
            `;
            document.getElementById('chat-container').appendChild(msgDiv);
            
            currentAiBubble = msgDiv.querySelector('.bubble');
            currentThinkingBlock = msgDiv.querySelector('.thinking-block');
            currentThinkingContent = msgDiv.querySelector('.thinking-content');
            scrollToBottom();
        };

        window.appendAiThinking = function(token) {
            if (!currentThinkingBlock) return;
            currentThinkingBlock.style.display = 'block'; 
            currentAiThinkingText += token;
            currentThinkingContent.innerText = currentAiThinkingText; 
            scrollToBottom();
        };

        window.appendAiToken = function(token) {
            if (!currentAiBubble) return;
            if (currentAiRawText === "" && token.trim() !== "") {
                currentAiBubble.innerHTML = ""; 
            }
            currentAiRawText += token;
            currentAiBubble.innerHTML = md.render(currentAiRawText);
            
            const aiMsg = currentAiBubble.closest('.ai-message');
            if (aiMsg) aiMsg.setAttribute('data-raw', currentAiRawText);
            
            scrollToBottom();
        };

        window.finishAiMessage = function() {
            if (!currentAiBubble) return;
            currentAiBubble.innerHTML = md.render(currentAiRawText);
            
            const aiMsg = currentAiBubble.closest('.ai-message');
            if (aiMsg) aiMsg.setAttribute('data-raw', currentAiRawText);

            const pres = currentAiBubble.querySelectorAll('pre');
            pres.forEach(pre => {
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = '复制';
                btn.onclick = function() {
                    const code = pre.querySelector('code').innerText;
                    if (bridge) bridge.copyToClipboard(code); 
                    btn.innerText = '已复制!';
                    setTimeout(() => { btn.innerText = '复制'; }, 2000);
                };
                pre.style.position = 'relative';
                pre.appendChild(btn);
            });
            currentAiBubble = null;
            currentThinkingBlock = null;
            scrollToBottom();
        };
        
        window.showError = function(errMsg) {
            if (currentAiBubble) {
                currentAiBubble.innerHTML = `<span style="color: #ff4d4f;">❌ 请求失败: ${errMsg}</span>`;
                currentAiBubble = null;
            }
        }

        window.loadHistory = function(messages) {
            currentAiBubble = null;
            currentAiRawText = "";
            currentAiThinkingText = "";
            currentThinkingBlock = null;
            currentThinkingContent = null;
            const container = document.getElementById('chat-container');
            container.innerHTML = ''; 
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + (msg.role === 'user' ? 'user-message' : 'ai-message');
                
                if (msg.role !== 'user') {
                    msgDiv.setAttribute('data-raw', msg.content);
                }

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                if (msg.role === 'user') {
                    bubble.innerHTML = msg.content.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
                } else {
                    bubble.innerHTML = md.render(msg.content);
                    const pres = bubble.querySelectorAll('pre');
                    pres.forEach(pre => {
                        const btn = document.createElement('button');
                        btn.className = 'copy-btn';
                        btn.innerText = '复制';
                        btn.onclick = function() {
                            const code = pre.querySelector('code').innerText;
                            if (bridge) bridge.copyToClipboard(code);
                            btn.innerText = '已复制!';
                            setTimeout(() => { btn.innerText = '复制'; }, 2000);
                        };
                        pre.style.position = 'relative';
                        pre.appendChild(btn);
                    });
                }
                msgDiv.appendChild(bubble);
                container.appendChild(msgDiv);
            });
            scrollToBottom();
        }

        window.showMeta = function(usage, elapsed, cachedTokens) {
            const container = document.getElementById('chat-container');
            const lastMsg = container.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('ai-message') && !lastMsg.querySelector('.usage-info')) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'usage-info';
                let text = `⏱️ 耗时: ${elapsed.toFixed(2)}s`;
                if (usage) {
                    const prompt = usage.prompt_tokens || 0;
                    const completion = usage.completion_tokens || 0;
                    const total = usage.total_tokens || (prompt + completion);
                    text += ` | ⚡ Tokens: ${prompt} 提示 + ${completion} 回复 = ${total} 总计`;
                    if (cachedTokens > 0) {
                        text += ` | <span style="color: #4ade80; font-weight: bold;">💾 缓存命中: ${cachedTokens}</span>`;
                    }
                }
                metaDiv.innerHTML = text; 
                lastMsg.appendChild(metaDiv);
                scrollToBottom();
            }
        };

        window.applyTheme = function(config) {
            const root = document.documentElement;
            root.style.setProperty('--chat-bg-image', config.chat_bg_image ? `url('${config.chat_bg_image}')` : 'none');
            root.style.setProperty('--overlay-color', config.overlay_color || 'rgba(0,0,0,0)');
            root.style.setProperty('--bubble-user-bg', config.bubble_user_bg || '#2c5282');
            root.style.setProperty('--bubble-ai-bg', config.bubble_ai_bg || '#333333');
            root.style.setProperty('--text-color', config.text_color || '#e0e0e0');
        };
    </script>
</body>
</html>
